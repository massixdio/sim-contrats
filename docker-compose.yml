services:
  postgres:
    image: postgres:16-alpine
    container_name: insurance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-insurance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insurance}
      POSTGRES_DB: ${POSTGRES_DB:-insurance_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-insurance} -d ${POSTGRES_DB:-insurance_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - insurance_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insurance_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-insurance}:${POSTGRES_PASSWORD:-insurance}@postgres:5432/${POSTGRES_DB:-insurance_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change_me_super_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate deploy && npx prisma generate && npm run dev"
    networks:
      - insurance_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: insurance_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - insurance_network

volumes:
  postgres_data:

networks:
  insurance_network:
    driver: bridge
